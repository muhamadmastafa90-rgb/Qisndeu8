<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Love Captcha 💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  radial-gradient(circle at top,#ffe6f0,#f6edf7 45%,#e8ebff);
  overflow:hidden;
}

.phone{
  width:390px;
  height:820px;
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.85),
    rgba(255,255,255,.65)
  );

  backdrop-filter:blur(20px);

  border-radius:42px;

  border:1px solid rgba(255,255,255,.8);

  box-shadow:
  0 25px 80px rgba(0,0,0,.18);

  overflow:hidden;
  position:relative;
}

.notch{
  width:120px;
  height:28px;
  background:#111;
  border-radius:20px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

.screen{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:55px 18px 20px;
}

.captcha-shell{
  width:100%;
  max-width:350px;
}

.card{
  background:#fff;
  border-radius:18px;
  border:1px solid #ececec;
  box-shadow:
  0 10px 30px rgba(0,0,0,.08);
}

.recaptcha{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
}

.checkbox{
  width:30px;
  height:30px;
  border:2px solid #9aa0a6;
  border-radius:6px;
  cursor:pointer;
}

.checkbox.verified{
  background:#34a853;
  border-color:#34a853;
  position:relative;
}

.checkbox.verified::before{
  content:"✓";
  color:#fff;
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  font-weight:900;
}

.recaptcha-main{
  flex:1;
}

.recaptcha-title{
  font-size:16px;
  color:#222;
}

.recaptcha-side{
  text-align:center;
  font-size:10px;
  color:#777;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:
  conic-gradient(
    #4285f4,
    #34a853,
    #fbbc05,
    #ea4335,
    #4285f4
  );
  color:#fff;
  margin:auto auto 5px;
}

.challenge{
  margin-top:14px;
  display:none;
}

.challenge.show{
  display:block;
}

.challenge-head{
  background:
  linear-gradient(
    180deg,
    #ff95be,
    #ff6fa8
  );

  color:#fff;
  padding:16px;
  border-radius:
  18px 18px 0 0;
}

.challenge-label{
  font-size:13px;
  margin-bottom:5px;
}

.challenge-title{
  font-size:20px;
  font-weight:700;
}

.challenge-body{
  background:#fff;
  border-radius:
  0 0 18px 18px;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);
  gap:8px;
  padding:12px;
}

.tile{
  aspect-ratio:1;
  border-radius:16px;
  background:#fff7fb;
  border:2px solid #f4d7e3;

  display:grid;
  place-items:center;

  font-size:38px;
  cursor:pointer;
}

.tile.selected{
  background:#ffe3ee;
  border-color:#ff6fa8;
}

.challenge-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
}

.verify-btn{
  border:none;
  background:
  linear-gradient(
    180deg,
    #ff95be,
    #ff6fa8
  );

  color:#fff;
  padding:
  12px 22px;

  border-radius:12px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.letter-wrap{
  position:absolute;
  inset:55px 16px 16px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  pointer-events:none;
}

.letter-card{
  width:100%;
  max-width:350px;

  background:
  rgba(255,255,255,.96);

  border-radius:28px;

  overflow:hidden;

  opacity:0;

  transform:
  translateY(70px)
  scale(.95);

  transition:.7s;
}

.letter-card.show{
  opacity:1;
  transform:
  translateY(0)
  scale(1);
}

.letter-top{
  padding:22px;
  text-align:center;

  background:
  linear-gradient(
    135deg,
    #ffe7ef,
    #fff6fa,
    #eef5ff
  );
}

.hero-emoji{
  font-size:70px;
}

.hero-heart{
  font-size:32px;
}

.hero-title{
  font-size:25px;
  font-weight:800;
  color:#6d4f5c;
}

.letter-scroll{
  padding:20px;
}

.letter-text{
  line-height:2;
  white-space:pre-line;
  color:#444;
}

.letter-sign{
  text-align:center;
  margin-top:20px;
  color:#cc6c92;
  font-weight:700;
}

/* Music Player */

.music-player{
  display:none;
  margin-top:22px;

  background:
  rgba(255,255,255,.92);

  border:1px solid
  rgba(255,182,193,.35);

  border-radius:24px;

  padding:14px;

  align-items:center;
  gap:14px;

  box-shadow:
  0 12px 35px
  rgba(255,182,193,.22);
}

.music-player.show{
  display:flex;
}

.music-cover{
  width:60px;
  height:60px;
  border-radius:18px;

  display:grid;
  place-items:center;

  font-size:30px;

  background:
  linear-gradient(
    135deg,
    #ffdbe7,
    #fff1f7
  );
}

.music-info{
  flex:1;
}

.music-title{
  font-weight:800;
  color:#cb7296;
  margin-bottom:10px;
}

.music-bar{
  width:100%;
  height:6px;
  background:#ffe4ef;
  border-radius:999px;
  overflow:hidden;
}

.music-progress{
  width:0%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    #ffb8d1,
    #ff88af
  );
}

.music-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:
  linear-gradient(
    180deg,
    #ffd9e6,
    #ffb9cf
  );

  color:#fff;
  font-size:18px;
}
</style>
</head>
  <div class="hearts" id="hearts"></div>

<div class="screen">
  <div class="captcha-shell" id="captchaShell">

    <div class="card recaptcha">
      <div class="checkbox" id="checkbox"></div>

      <div class="recaptcha-main">
        <div class="recaptcha-title" id="mainTitle">
          من ڕۆبۆت نیم، بەڵکو عاشقی تۆم 💖
        </div>
      </div>

      <div class="recaptcha-side">
        <div class="logo">✓</div>
        <div>reCAPTCHA</div>
        <div>Love</div>
      </div>
    </div>

    <div class="challenge" id="challenge">
      <div class="challenge-head">
        <div class="challenge-label">
          هەڵبژاردن
        </div>

        <div class="challenge-title">
          هەموو دڵەکان هەڵبژێرە 💖
        </div>
      </div>

      <div class="challenge-body">

        <div class="grid">
          <div class="tile" data-index="0">🌸</div>
          <div class="tile" data-index="1">💖</div>
          <div class="tile" data-index="2">🦋</div>

          <div class="tile" data-index="3">☁️</div>
          <div class="tile" data-index="4">💕</div>
          <div class="tile" data-index="5">🐼</div>

          <div class="tile" data-index="6">🎀</div>
          <div class="tile" data-index="7">💗</div>
          <div class="tile" data-index="8">🌙</div>
        </div>

        <div class="challenge-actions">
          <div>
            Love Captcha 💖
          </div>

          <button
            class="verify-btn"
            id="verifyBtn"
          >
            سەلماندن
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<div class="letter-wrap">

  <div
    class="letter-card"
    id="letterCard"
  >

    <div class="letter-top">
      <div class="hero-emoji">
        🐼💖
      </div>

      <div class="hero-heart">
        💗
      </div>

      <div class="hero-title">
        تاقانەکەی دڵم
      </div>
    </div>

    <div class="letter-scroll">

      <p
        class="letter-text"
        id="letterText"
      >
      </p>

      <div class="letter-sign">
        لەگەڵ هەموو خۆشەویستییەکم 💕
      </div>

      <div
        class="music-player"
        id="musicPlayer"
      >

        <div class="music-cover">
          🎵
        </div>

        <div class="music-info">
          <div class="music-title">
            Our Song 💖
          </div>

          <div class="music-bar">
            <div
              class="music-progress"
              id="musicProgress"
            ></div>
          </div>
        </div>

        <button
          class="music-btn"
          id="playBtn"
        >
          ❚❚
        </button>

      </div>

    </div>

  </div>

</div>

<audio id="bgMusic" loop>
  <source
    src="1000054433.mp4"
    type="audio/mp4"
  >
</audio>

<script>

const checkbox =
document.getElementById(
"checkbox"
);

const challenge =
document.getElementById(
"challenge"
);

const verifyBtn =
document.getElementById(
"verifyBtn"
);

const letterCard =
document.getElementById(
"letterCard"
);

const letterText =
document.getElementById(
"letterText"
);

const hearts =
document.getElementById(
"hearts"
);

const bgMusic =
document.getElementById(
"bgMusic"
);

const playBtn =
document.getElementById(
"playBtn"
);

const musicProgress =
document.getElementById(
"musicProgress"
);

const musicPlayer =
document.getElementById(
"musicPlayer"
);

const tiles =
[
...document.querySelectorAll(
".tile"
)
];

const correct =
[1,4,7];

const selected =
new Set();

let verified =
false;

const message =
`
تاقانەکەی دڵم 💖

تۆ جوانترین ڕووناکی ژیانمی.
هەر کاتێ ناوت دێتە سەر زمانی من،
دڵم پڕ لە ئارامی دەبێت.

بوونت لەگەڵمدا
وەک مانگەشەوێکی ئارامە،
وەک گوڵێکی جوانە
لە ناو باخچەی دڵم.

سوپاس بۆ خەندەکانت،
سوپاس بۆ خۆشەویستییەکانت،
سوپاس بۆ هەموو ئەو چرکەساتانەی
کە ژیانم جوانتر کردووە.

خۆشمدەوێیت...
ئەوەندەی
وشەکان ناتوانن باس بکەن. 💕
`;

letterText.textContent =
message;

checkbox.onclick =
() => {
  if(verified)
  return;

  challenge.classList
  .toggle("show");
};

tiles.forEach(
tile => {

tile.onclick = () => {

if(verified)
return;

const i =
Number(
tile.dataset.index
);

if(
selected.has(i)
){
selected.delete(i);

tile.classList.remove(
"selected"
);

}else{

selected.add(i);

tile.classList.add(
"selected"
);

}

};

});

verifyBtn.onclick =
() => {

if(
selected.size !== 3
){
return;
}

const ok =
correct.every(
x =>
selected.has(x)
);

if(!ok)
return;

verified = true;

checkbox.classList
.add("verified");

challenge.classList
.remove("show");

document
.getElementById(
"mainTitle"
)
.textContent =
"سەلمێندرا بە سەرکەوتوویی 💖";

spawnHearts();

setTimeout(
() => {

letterCard
.classList
.add("show");

musicPlayer
.classList
.add("show");

bgMusic.play()
.catch(()=>{});

},
700
);

};

function spawnHearts(){

for(
let i=0;
i<25;
i++
){

const heart =
document.createElement(
"div"
);

heart.className =
"heart";

heart.innerHTML =
[
"💖",
"💕",
"💗",
"✨"
][
Math.floor(
Math.random()*4
)
];

heart.style.left =
Math.random()*100
+"%";

heart.style.fontSize =
(
20+
Math.random()*20
)+"px";

heart.style.animationDuration =
(
5+
Math.random()*5
)+"s";

hearts.appendChild(
heart
);

}

}

playBtn.onclick =
() => {

if(
bgMusic.paused
){

bgMusic.play();

playBtn.innerHTML =
"❚❚";

}else{

bgMusic.pause();

playBtn.innerHTML =
"▶";

}

};

bgMusic.addEventListener(
"timeupdate",
() => {

if(
!bgMusic.duration
)
return;

const p =
(
bgMusic.currentTime
/
bgMusic.duration
)
*100;

musicProgress
.style.width =
p + "%";

}
);

</script>

</body>
</html>
<body>
