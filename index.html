<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Love Gift</title>

<style>
:root{
  --bg1:#ffd7ea;
  --bg2:#fff1f7;
  --pink:#f7a8cb;
  --pink-dark:#d970a2;
  --green:#8ce0a0;
  --green-dark:#2e6b40;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  radial-gradient(circle at top left,#fff,transparent 30%),
  linear-gradient(180deg,var(--bg1),var(--bg2));
  overflow:hidden;
}

.container{
  width:min(390px,95%);
  min-height:780px;
  background:rgba(255,255,255,.45);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:40px;
  box-shadow:0 25px 70px rgba(0,0,0,.15);
  overflow:hidden;
  position:relative;
}

.header{
  padding:30px 20px;
  text-align:center;
}

.title{
  font-size:20px;
  font-weight:900;
  color:#824d67;
}

.content{
  padding:20px;
  text-align:center;
}

.main-panda{
  width:180px;
  height:180px;
  object-fit:contain;
  animation:bob 2.8s ease-in-out infinite;
}

.mini-pandas{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
}

.mini-pandas img{
  width:70px;
  height:70px;
  object-fit:contain;
}

.question{
  margin-top:30px;
  font-size:30px;
  font-weight:900;
  color:#613447;
  line-height:1.5;
}

.sub{
  margin-top:12px;
  color:#8c5e74;
  font-weight:700;
}

.buttons{
  margin-top:35px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

button{
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  transition:.2s;
}

button:active{
  transform:scale(.95);
}

.yes{
  background:linear-gradient(
    180deg,
    #b8f0c5,
    #7fdc9c
  );
  color:#245332;
}

.no{
  background:linear-gradient(
    180deg,
    #fff6fa,
    #f7dde8
  );
  color:#8f5871;
}

.poem{
  margin-top:30px;
  background:rgba(255,255,255,.7);
  border-radius:25px;
  padding:20px;
  display:none;
}

.poem h3{
  color:#7b4760;
  margin-bottom:15px;
}

.poem p{
  line-height:2;
  font-size:18px;
  color:#452a36;
}

.rain{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.falling{
  position:absolute;
  top:-10%;
  width:40px;
  height:40px;
  object-fit:contain;
  animation:fall linear forwards;
}

@keyframes bob{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-10px);
  }
}

@keyframes fall{
  from{
    transform:translateY(-50px);
  }
  to{
    transform:translateY(110vh);
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="rain" id="rain"></div>

  <div class="header">
    <div class="title">
      Panda Love Gift 🐼🤍
    </div>
  </div>

  <div class="content">

    <!-- پاندا سەرەکی -->
    <img
      id="mainPanda"
      class="main-panda"
      src="panda1.webp"
      alt="Panda"
    >

    <!-- پاندا بچووکەکان -->
    <div class="mini-pandas">
      <img src="panda2.webp" alt="Panda">
      <img src="panda3.webp" alt="Panda">
      <img src="panda4.jpg" alt="Panda">
    </div>

    <div
      class="question"
      id="question"
    >
      دەبیت بە خۆشەویستم؟ 🤍
    </div>

    <div
      class="sub"
      id="sub"
    >
      دیارییەکی بچووک بە دڵێکی گەورە
    </div>

    <div class="buttons">

      <button
        class="no"
        id="noBtn"
      >
        نەخێر
      </button>

      <button
        class="yes"
        id="yesBtn"
      >
        بەڵێ 🐼
      </button>

    </div>

    <!-- پەیامی دوای بەڵێ -->
    <div
      class="poem"
      id="poem"
    >

      <h3>
        🐼 Love Panda
      </h3>

      <p>
        لەگەڵ تۆ،
        تەنانەت ساتە سادەکانیش
        دەبن بە جوانترین
        یادەوەرییەکان 🤍
      </p>

    </div>

  </div>
<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const poem = document.getElementById("poem");
const question = document.getElementById("question");
const sub = document.getElementById("sub");
const rain = document.getElementById("rain");

const pandaImages = [
  "panda1.webp",
  "panda2.webp",
  "panda3.webp",
  "panda4.jpg"
];

let moveCount = 0;

/* بارانی پاندا */
function createRain() {
  const img = document.createElement("img");

  img.className = "falling";
  img.src =
    pandaImages[
      Math.floor(Math.random() * pandaImages.length)
    ];

  img.style.left =
    Math.random() * 100 + "%";

  img.style.width =
    30 + Math.random() * 25 + "px";

  img.style.height =
    img.style.width;

  img.style.animationDuration =
    6 + Math.random() * 6 + "s";

  rain.appendChild(img);

  setTimeout(() => {
    img.remove();
  }, 12000);
}

/* دەستپێکردنی باران */
for (let i = 0; i < 12; i++) {
  createRain();
}

setInterval(() => {
  createRain();
}, 800);

/* دوگمەی نەخێر ڕادەکات */
function moveNoButton() {

  moveCount++;

  const x =
    Math.random() * 140 - 70;

  const y =
    Math.random() * 50 - 25;

  noBtn.style.transform =
    `translate(${x}px, ${y}px)`;

  if (moveCount < 3) {
    noBtn.textContent =
      "دووبارە بیر بکەوە";
  } else {
    noBtn.textContent =
      "پاندا نارەحەت دەبێت 🐼";
  }
}

noBtn.addEventListener(
  "mouseenter",
  moveNoButton
);

noBtn.addEventListener(
  "click",
  moveNoButton
);

noBtn.addEventListener(
  "touchstart",
  moveNoButton,
  { passive: true }
);

/* کاتێ بەڵێ کرتە دەکرێت */
yesBtn.addEventListener(
  "click",
  () => {

    question.textContent =
      "بووی بە جوانترین پاندا لە دڵمدا 🤍";

    sub.textContent =
      "ئەم دیارییە تەنها بۆ تۆ درووست کراوە";

    poem.style.display =
      "block";

    yesBtn.textContent =
      "تەواو بوو 🐼";

    yesBtn.disabled = true;

    noBtn.style.opacity = ".5";

    /* بارانی زۆرتر */
    for (let i = 0; i < 25; i++) {
      setTimeout(() => {
        createRain();
      }, i * 100);
    }

  }
);

</script>
  </body>
</html>
</div>
