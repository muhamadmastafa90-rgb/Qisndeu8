<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
/>

<title>Love Captcha 💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  "Segoe UI",
  sans-serif;
}

:root{
  --pink:#ff93bc;
  --pink2:#ffd9e8;
  --white:#ffffff;
  --text:#444;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;

  background:
  radial-gradient(
    circle at top,
    #ffe6f0,
    #f7eef8 45%,
    #edf1ff
  );
}

.phone{
  width:100%;
  max-width:390px;
  height:100dvh;
  max-height:844px;

  position:relative;
  overflow:hidden;

  border-radius:38px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.88),
    rgba(255,255,255,.68)
  );

  backdrop-filter:blur(22px);

  box-shadow:
  0 25px 80px
  rgba(0,0,0,.15);
}

.notch{
  width:120px;
  height:30px;

  background:#111;

  border-radius:999px;

  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  z-index:50;
}

.screen{
  width:100%;
  height:100%;

  overflow-y:auto;
  overflow-x:hidden;

  padding:
  55px
  14px
  20px;
}

.screen::-webkit-scrollbar{
  display:none;
}

.captcha-shell{
  width:100%;
  max-width:350px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:22px;
  border:1px solid #f1f1f1;

  box-shadow:
  0 12px 35px
  rgba(0,0,0,.08);
}

.recaptcha{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
}

.checkbox{
  width:32px;
  height:32px;
  border-radius:8px;
  border:2px solid #9aa0a6;
  cursor:pointer;
  flex-shrink:0;
}

.checkbox.verified{
  background:#34c759;
  border-color:#34c759;
  position:relative;
}

.checkbox.verified::before{
  content:"✓";
  color:#fff;
  font-size:20px;
  font-weight:900;

  position:absolute;
  inset:0;

  display:grid;
  place-items:center;
}

.recaptcha-main{
  flex:1;
}

.recaptcha-title{
  font-size:16px;
  color:#222;
  line-height:1.6;
}

.recaptcha-side{
  text-align:center;
  font-size:10px;
  color:#888;
}

.logo{
  width:34px;
  height:34px;

  border-radius:50%;

  display:grid;
  place-items:center;

  margin:auto auto 5px;

  background:
  conic-gradient(
    #4285f4,
    #34a853,
    #fbbc05,
    #ea4335,
    #4285f4
  );

  color:#fff;
}

.challenge{
  display:none;
  margin-top:14px;
}

.challenge.show{
  display:block;
}
  .challenge-head{
  background:
  linear-gradient(
    180deg,
    #ff9dc4,
    #ff7daf
  );

  color:#fff;
  padding:16px;
  border-radius:
  22px
  22px
  0
  0;
}

.challenge-label{
  font-size:13px;
  opacity:.9;
  margin-bottom:5px;
}

.challenge-title{
  font-size:20px;
  font-weight:700;
  line-height:1.5;
}

.challenge-body{
  background:#fff;
  border-radius:
  0
  0
  22px
  22px;

  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);

  gap:10px;
  padding:14px;
}

.tile{
  aspect-ratio:1;
  border-radius:18px;

  background:
  linear-gradient(
    180deg,
    #fff,
    #fff6fa
  );

  border:2px solid #f6d9e6;

  display:grid;
  place-items:center;

  font-size:38px;
  cursor:pointer;

  transition:.25s;
}

.tile.selected{
  border-color:#ff86b4;

  background:
  linear-gradient(
    180deg,
    #ffe3ef,
    #ffd6e8
  );

  transform:scale(.95);
}

.challenge-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:14px;
}

.verify-btn{
  border:none;
  border-radius:14px;

  padding:
  12px
  24px;

  background:
  linear-gradient(
    180deg,
    #ff9dc4,
    #ff78ad
  );

  color:#fff;
  font-size:15px;
  font-weight:700;
}

.letter-wrap{
  position:absolute;
  inset:
  55px
  12px
  12px;

  display:flex;
  justify-content:center;
  align-items:flex-end;

  pointer-events:none;
}

.letter-card{
  width:100%;
  max-width:350px;
  max-height:78vh;

  overflow:auto;

  background:
  rgba(255,255,255,.96);

  border-radius:30px;

  box-shadow:
  0 20px 60px
  rgba(255,182,193,.25);

  opacity:0;

  transform:
  translateY(60px)
  scale(.96);

  transition:.7s;

  pointer-events:auto;
}

.letter-card.show{
  opacity:1;

  transform:
  translateY(0)
  scale(1);
}

.letter-top{
  padding:22px;
  text-align:center;

  background:
  linear-gradient(
    135deg,
    #ffe7f0,
    #fff8fb,
    #f4f8ff
  );
}

.panda-image{
  width:150px;
  display:block;
  margin:auto;
}

.hero-title{
  margin-top:12px;
  font-size:25px;
  font-weight:800;
  color:#7a5363;
}

.letter-scroll{
  padding:22px;
}

.letter-text{
  white-space:pre-line;
  line-height:2.1;
  color:#555;
}

.letter-sign{
  text-align:center;
  margin-top:20px;

  color:#d46b96;
  font-weight:700;
}

.music-player{
  margin-top:24px;

  background:
  rgba(255,235,243,.92);

  border:1px solid
  rgba(255,182,193,.3);

  border-radius:22px;

  padding:14px;

  display:flex;
  align-items:center;
  gap:12px;
}

.music-cover{
  width:58px;
  height:58px;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #ffd6e5,
    #fff
  );

  display:grid;
  place-items:center;

  font-size:28px;
}

.music-info{
  flex:1;
}

.music-title{
  font-weight:700;
  color:#cf7299;
  margin-bottom:8px;
}

.music-bar{
  height:6px;
  background:#ffd9e8;
  border-radius:999px;
  overflow:hidden;
}

.music-progress{
  width:0%;
  height:100%;

  background:
  linear-gradient(
    90deg,
    #ff9ec5,
    #ff79af
  );
}

.music-btn{
  border:none;

  width:50px;
  height:50px;

  border-radius:50%;

  background:
  linear-gradient(
    180deg,
    #ffc0d8,
    #ff90bb
  );

  color:#fff;
  font-size:18px;
}
  </style>
</head>
<body>

<div class="phone">

  <div class="notch"></div>

  <div class="screen">

    <div class="captcha-shell">

      <!-- ئەم شوێنە هەمان HTML ـی بەشی ١ و ٢ دابنێ -->

    </div>

  </div>

  <div class="hearts" id="hearts"></div>

</div>

<audio
  id="bgMusic"
  preload="auto"
  loop
>
  <source
    src="https://cdn.discordapp.com/attachments/1181378994243911761/1521260476544323648/74896a2c015d8bd377bdf7770c465185.mp3"
    type="audio/mpeg"
  >
</audio>

<script>

const checkbox =
document.getElementById(
"checkbox"
);

const challenge =
document.getElementById(
"challenge"
);

const verifyBtn =
document.getElementById(
"verifyBtn"
);

const letterCard =
document.getElementById(
"letterCard"
);

const letterText =
document.getElementById(
"letterText"
);

const bgMusic =
document.getElementById(
"bgMusic"
);

const playBtn =
document.getElementById(
"playBtn"
);

const musicProgress =
document.getElementById(
"musicProgress"
);

const musicPlayer =
document.getElementById(
"musicPlayer"
);

const tiles =
[
...document.querySelectorAll(
".tile"
)
];

const selected =
new Set();

const correct =
[1,4,7];

let verified =
false;

letterText.textContent =
`
تاقانەکەی دڵم 💖

تۆ وەک مانگێکی جوانی ناو شەوەکانی منیت،
وەک گوڵێک لە باخچەی دڵم.

بوونت لەگەڵمدا
هەموو شتێک جوانتر دەکات،
خەندەکانم زیاتر دەکات،
و دڵم ئارامتر دەکات.

هەر شوێنێک بم،
دڵم هەر لەگەڵ تۆیە.

خۆشمدەوێیت...
زیاتر لە هەموو وشەکان. 💕
`;

checkbox.onclick =
() => {

if(verified)
return;

challenge.classList
.toggle("show");

};

tiles.forEach(
tile => {

tile.onclick =
() => {

if(verified)
return;

const i =
Number(
tile.dataset.index
);

if(
selected.has(i)
){

selected.delete(i);

tile.classList
.remove(
"selected"
);

}else{

selected.add(i);

tile.classList
.add(
"selected"
);

}

};

});

verifyBtn.onclick =
() => {

if(
selected.size !== 3
)
return;

const ok =
correct.every(
x =>
selected.has(x)
);

if(!ok)
return;

verified = true;

checkbox.classList
.add(
"verified"
);

challenge.classList
.remove(
"show"
);

document
.getElementById(
"mainTitle"
)
.textContent =
"سەلمێندرا بە سەرکەوتوویی 💖";

spawnHearts();

setTimeout(
() => {

letterCard
.classList
.add(
"show"
);

musicPlayer
.classList
.add(
"show"
);

bgMusic.play()
.catch(()=>{});

},
700
);

};

function spawnHearts(){

const hearts =
document.getElementById(
"hearts"
);

for(
let i=0;
i<35;
i++
){

const h =
document.createElement(
"div"
);

h.innerHTML =
[
"💖",
"💕",
"💗",
"✨",
"🌸"
][
Math.floor(
Math.random()*5
)
];

h.style.position =
"absolute";

h.style.left =
Math.random()*100
+"%";

h.style.top =
Math.random()*100
+"%";

h.style.fontSize =
(
20+
Math.random()*18
)+"px";

h.style.animation =
"float 6s linear infinite";

hearts.appendChild(
h
);

}

}

playBtn.onclick =
() => {

if(
bgMusic.paused
){

bgMusic.play();

playBtn.innerHTML =
"❚❚";

}else{

bgMusic.pause();

playBtn.innerHTML =
"▶";

}

};

bgMusic.addEventListener(
"timeupdate",
() => {

if(
!bgMusic.duration
)
return;

const p =
(
bgMusic.currentTime
/
bgMusic.duration
)
*100;

musicProgress
.style.width =
p + "%";

}
);

</script>

<style>

.hearts{
  position:absolute;
  inset:0;
  pointer-events:none;
}

@keyframes float{

0%{
  transform:
  translateY(20px);
  opacity:0;
}

20%{
  opacity:1;
}

100%{
  transform:
  translateY(-850px)
  rotate(360deg);

  opacity:0;
}

}

</style>

</body>
</html>
