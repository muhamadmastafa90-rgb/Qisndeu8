<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Captcha 💖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Segoe UI",
  sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  overflow:hidden;

  background:
  linear-gradient(
    180deg,
    #fdf5f8,
    #ffeef5
  );
}

.phone{
  width:100%;
  max-width:390px;
  height:92vh;

  background:
  linear-gradient(
    180deg,
    #fff,
    #fff7fb
  );

  border-radius:42px;

  box-shadow:
  0 20px 70px
  rgba(255,182,193,.35);

  overflow:hidden;
  position:relative;
}

.notch{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);

  width:135px;
  height:32px;

  background:#111;
  border-radius:999px;
}

.screen{
  height:100%;
  padding:
  70px
  18px
  20px;

  display:flex;
  justify-content:center;
  align-items:center;
}

.captcha-shell{
  width:100%;
}

.card{
  background:#fff;
  border-radius:24px;

  box-shadow:
  0 15px 40px
  rgba(255,192,203,.18);
}

.recaptcha{
  padding:20px;
}

.recaptcha-top{
  display:flex;
  align-items:center;
  gap:14px;
}

.checkbox{
  width:32px;
  height:32px;

  border:2px solid #bbb;
  border-radius:8px;

  flex-shrink:0;
  cursor:pointer;

  display:grid;
  place-items:center;
}

.checkbox.verified{
  background:#ff8fba;
  border-color:#ff8fba;
  color:#fff;
  font-weight:bold;
}

.recaptcha-title{
  font-size:17px;
  color:#444;
}

.challenge{
  margin-top:16px;
  display:none;
}

.challenge.show{
  display:block;
}
  .challenge-head{
  background:
  linear-gradient(
    180deg,
    #ffb7d2,
    #ff90bb
  );

  color:#fff;
  padding:16px;
  border-radius:
  20px
  20px
  0
  0;
}

.challenge-label{
  font-size:13px;
  opacity:.9;
}

.challenge-title{
  margin-top:5px;
  font-size:20px;
  font-weight:700;
  line-height:1.5;
}

.challenge-body{
  background:#fff;
  border-radius:
  0
  0
  20px
  20px;

  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);

  gap:10px;
  padding:14px;
}

.tile{
  aspect-ratio:1;
  border-radius:18px;

  background:
  linear-gradient(
    180deg,
    #fff,
    #fff5f9
  );

  border:2px solid #ffe0ec;

  display:grid;
  place-items:center;

  font-size:38px;
  cursor:pointer;
  transition:.25s;
}

.tile.selected{
  background:#ffd8e8;
  border-color:#ff90bb;
  transform:scale(.95);
}

.challenge-actions{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.challenge-note{
  font-size:12px;
  color:#999;
}

.verify-btn{
  border:none;
  border-radius:14px;

  padding:
  12px
  22px;

  background:
  linear-gradient(
    180deg,
    #ff9fc6,
    #ff7cad
  );

  color:#fff;
  font-weight:700;
}

.letter-card{
  display:none;

  width:100%;
  height:100%;

  overflow:auto;
}

.letter-card.show{
  display:block;
}

.letter-top{
  text-align:center;
  padding:20px;
}

.panda-image{
  width:170px;
  display:block;
  margin:auto;
}

.hero-title{
  margin-top:14px;
  font-size:28px;
  color:#d96b99;
  font-weight:800;
}

.letter-scroll{
  padding:24px;
}

.letter-text{
  line-height:2.2;
  color:#555;
  white-space:pre-line;
}

.letter-sign{
  text-align:center;
  margin-top:24px;
  color:#d96b99;
  font-weight:700;
}
  </style>
</head>
<body>

<div class="phone">

  <div class="notch"></div>

  <div class="screen">

    <div class="captcha-shell">

      <div class="card recaptcha">

        <div class="recaptcha-top">

          <div
            class="checkbox"
            id="checkbox"
          ></div>

          <div
            class="recaptcha-title"
            id="mainTitle"
          >
            من ڕۆبۆت نیم، بەڵکو عاشقی تۆم 💖
          </div>

        </div>

        <div
          class="challenge"
          id="challenge"
        >

          <div class="challenge-head">
            <div class="challenge-label">
              هەڵبژاردن
            </div>

            <div class="challenge-title">
              هەموو دڵەکان هەڵبژێرە 💖
            </div>
          </div>

          <div class="challenge-body">

            <div class="grid">

              <div class="tile" data-index="0">🦋</div>
              <div class="tile" data-index="1">💖</div>
              <div class="tile" data-index="2">🌸</div>

              <div class="tile" data-index="3">🎀</div>
              <div class="tile" data-index="4">💗</div>
              <div class="tile" data-index="5">🐼</div>

              <div class="tile" data-index="6">☕</div>
              <div class="tile" data-index="7">💕</div>
              <div class="tile" data-index="8">🍓</div>

            </div>

            <div class="challenge-actions">

              <div class="challenge-note">
                Love Captcha
              </div>

              <button
                class="verify-btn"
                id="verifyBtn"
              >
                سەلماندن
              </button>

            </div>

          </div>

        </div>

      </div>

      <div
        class="letter-card"
        id="letterCard"
      >

        <div class="letter-top">

          <img
            class="panda-image"
            src="panda.png"
          >

          <div class="hero-title">
            تاقانەکەی دڵم 💖
          </div>

        </div>

        <div class="letter-scroll">

          <div
            class="letter-text"
            id="letterText"
          ></div>

          <div class="letter-sign">
            لەگەڵ هەموو خۆشەویستییەکم 💕
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<audio
  id="bgMusic"
  loop
>
  <source
    src="https://cdn.discordapp.com/attachments/1181378994243911761/1521260476544323648/74896a2c015d8bd377bdf7770c465185.mp3"
    type="audio/mpeg"
  >
</audio>

<script>

const checkbox =
document.getElementById(
"checkbox"
);

const challenge =
document.getElementById(
"challenge"
);

const verifyBtn =
document.getElementById(
"verifyBtn"
);

const letterCard =
document.getElementById(
"letterCard"
);

const letterText =
document.getElementById(
"letterText"
);

const bgMusic =
document.getElementById(
"bgMusic"
);

const tiles =
[
...document.querySelectorAll(
".tile"
)
];

const selected =
new Set();

const correct =
[1,4,7];

let verified =
false;

letterText.textContent =
`
تاقانەکەی دڵم 💖

تۆ بۆ من تەنها کەسێک نیت،
تۆ ئارامی دڵم و جوانترین بەشی ڕۆژەکانمی.

بوونت لە ژیانمدا
وەک ڕووناکییە لە شەوێکی ئارامدا،
وەک گەرماییە لە ڕۆژێکی سارددا.

هەر شوێنێک بم،
دڵم هەر لەگەڵ تۆیە.

خۆشمدەوێیت...
زیاتر لە هەموو وشەکان. 💕
`;

checkbox.onclick =
() => {

if(verified)
return;

challenge.classList
.toggle(
"show"
);

};

tiles.forEach(
tile => {

tile.onclick =
() => {

if(verified)
return;

const i =
Number(
tile.dataset.index
);

if(
selected.has(i)
){

selected.delete(i);

tile.classList
.remove(
"selected"
);

}else{

selected.add(i);

tile.classList
.add(
"selected"
);

}

};

});

verifyBtn.onclick =
() => {

const ok =
correct.every(
x =>
selected.has(x)
);

if(
selected.size !== 3 ||
!ok
){
alert(
"تەنها دڵەکان هەڵبژێرە 💖"
);
return;
}

verified =
true;

checkbox.innerHTML =
"✓";

checkbox.classList
.add(
"verified"
);

challenge.classList
.remove(
"show"
);

document
.getElementById(
"mainTitle"
)
.textContent =
"سەلمێندرا بە سەرکەوتوویی 💖";

setTimeout(
() => {

letterCard
.classList
.add(
"show"
);

bgMusic.play()
.catch(()=>{});

},
700
);

};

</script>

</body>
</html>
