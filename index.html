<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Captcha</title>

<style>
:root{
  --bg1:#d8d0d3;
  --bg2:#cec3c8;
  --phone:#f7f1f4;
  --card:#ffffff;
  --line:#dadce0;
  --text:#202124;
  --muted:#5f6368;
  --blue:#1a73e8;
  --success:#34a853;
}

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  "SF Pro Text",
  "Segoe UI",
  "Noto Sans Arabic",
  sans-serif;

  background:
  radial-gradient(circle at top right,#efe5ea 0%,transparent 32%),
  radial-gradient(circle at bottom left,#e7d7df 0%,transparent 28%),
  linear-gradient(180deg,var(--bg1),var(--bg2));

  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
}

.phone{
  position:relative;
  width:min(92vw,392px);
  height:min(94vh,790px);

  border-radius:38px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.75),
    rgba(255,255,255,.45)
  ),
  var(--phone);

  border:1px solid rgba(255,255,255,.85);

  box-shadow:
  0 30px 80px rgba(0,0,0,.18),
  inset 0 1px 0 rgba(255,255,255,.8);

  overflow:hidden;
}

.phone::before{
  content:"";
  position:absolute;
  inset:0;

  background:
  radial-gradient(
    circle at 15% 10%,
    rgba(255,255,255,.7),
    transparent 30%
  ),
  radial-gradient(
    circle at 85% 90%,
    rgba(255,192,203,.22),
    transparent 25%
  );
}

.notch{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:28px;
  border-radius:20px;
  background:#111;
  z-index:5;
}

.screen{
  position:relative;
  width:100%;
  height:100%;
  z-index:1;

  padding:54px 14px 16px;

  display:flex;
  align-items:center;
  justify-content:center;
}

.captcha-shell{
  width:100%;
  max-width:360px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}

.recaptcha{
  padding:16px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  min-height:82px;
}

.checkbox{
  position:relative;
  width:30px;
  height:30px;
  border:2px solid #9aa0a6;
  border-radius:4px;
  background:#fff;
  cursor:pointer;
}

.checkbox.loading::before{
  content:"";
  position:absolute;
  inset:5px;

  border:3px solid #cfe0ff;
  border-top-color:#1a73e8;
  border-radius:50%;

  animation:spin .8s linear infinite;
}

.checkbox.verified{
  background:#34a853;
  border-color:#34a853;
}

.checkbox.verified::before{
  content:"✓";
  position:absolute;
  inset:0;

  display:grid;
  place-items:center;

  color:#fff;
  font-size:20px;
  font-weight:900;
}

.recaptcha-main{
  flex:1;
}

.recaptcha-title{
  font-size:16px;
  line-height:1.5;
  color:#202124;
}

.recaptcha-side{
  width:72px;
  text-align:center;
  color:#7b8188;
  font-size:10px;
}

.logo{
  width:34px;
  height:34px;
  margin:auto;
  margin-bottom:4px;

  display:grid;
  place-items:center;

  border-radius:50%;

  background:
  conic-gradient(
    from 210deg,
    #4285f4,
    #34a853,
    #fbbc05,
    #ea4335,
    #4285f4
  );

  color:#fff;
}

.challenge{
  margin-top:10px;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transform:translateY(-8px);

  transition:
  max-height .55s ease,
  opacity .35s ease,
  transform .35s ease;
}

.challenge.show{
  max-height:620px;
  opacity:1;
  transform:translateY(0);
}

.challenge-head{
  background:
  linear-gradient(
    180deg,
    #2d7ef7,
    #1967d2
  );

  color:#fff;
  padding:14px 16px 12px;
  border-radius:14px 14px 0 0;
}

.challenge-label{
  font-size:13px;
  margin-bottom:4px;
}

.challenge-title{
  font-size:21px;
  font-weight:700;
  line-height:1.45;
}

.challenge-body{
  background:#fff;
  border:1px solid var(--line);
  border-top:none;
  border-radius:0 0 14px 14px;
  overflow:hidden;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:12px;
  background:#f8f9fa;
}

.tile{
  aspect-ratio:1;
  border-radius:10px;
  border:2px solid #dfe3e7;

  background:
  radial-gradient(
    circle at 20% 20%,
    rgba(255,255,255,.95),
    rgba(255,255,255,.7) 45%,
    rgba(250,246,248,.95)
  );

  display:grid;
  place-items:center;
  font-size:40px;
  cursor:pointer;
}

.tile.selected{
  border-color:#1a73e8;
  box-shadow:
  0 0 0 3px rgba(26,115,232,.14);
}

.tile.selected::after{
  content:"✓";

  position:absolute;
  top:6px;
  left:6px;

  width:24px;
  height:24px;

  display:grid;
  place-items:center;

  border-radius:50%;
  background:#1a73e8;
  color:#fff;
}
  .challenge-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  background:#fff;
}

.challenge-note{
  font-size:12px;
  color:#7a7f86;
}

.verify-btn{
  border:none;
  background:linear-gradient(180deg,#2d7ef7,#1967d2);
  color:#fff;
  border-radius:8px;
  padding:12px 20px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.letter-wrap{
  position:absolute;
  inset:54px 14px 14px;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  pointer-events:none;
}

.letter-card{
  width:100%;
  max-width:360px;
  background:rgba(255,255,255,.97);
  border-radius:26px;
  overflow:hidden;

  opacity:0;
  transform:translateY(60px) scale(.97);

  transition:
  transform .7s cubic-bezier(.2,.8,.2,1),
  opacity .55s ease;

  pointer-events:none;

  box-shadow:
  0 28px 80px rgba(0,0,0,.18);
}

.letter-card.show{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

.letter-top{
  padding:18px;
  text-align:center;

  background:
  linear-gradient(
    135deg,
    #ffe7ef,
    #f9f0ff,
    #eef5ff
  );
}

.hero-emoji{
  font-size:64px;
}

.hero-heart{
  font-size:30px;
}

.hero-title{
  font-size:24px;
  font-weight:800;
  color:#5b4450;
}

.letter-scroll{
  padding:18px;
  overflow:auto;
}

.letter-text{
  margin:0;
  white-space:pre-line;
  line-height:2;
  color:#43484d;
}

.letter-sign{
  margin-top:16px;
  text-align:center;
  font-weight:700;
  color:#8a4b64;
}

/* Music Player */

.music-player{
  display:none;
  margin-top:22px;
  padding:14px;
  border-radius:24px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.97),
    rgba(255,240,246,.95)
  );

  border:1px solid rgba(255,192,203,.4);

  box-shadow:
  0 12px 30px rgba(255,182,193,.25);

  align-items:center;
  gap:14px;
}

.music-player.show{
  display:flex;
}

.music-cover{
  width:58px;
  height:58px;
  border-radius:18px;

  display:grid;
  place-items:center;

  font-size:28px;

  background:
  linear-gradient(
    135deg,
    #ffdce8,
    #fff4f8
  );
}

.music-info{
  flex:1;
}

.music-title{
  font-size:16px;
  font-weight:800;
  color:#c26b89;
  margin-bottom:10px;
}

.music-bar{
  width:100%;
  height:6px;
  border-radius:999px;
  overflow:hidden;
  background:#ffe4ee;
}

.music-progress{
  width:0%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    #ffb6c1,
    #ff8fb1
  );
}

.music-btn{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  cursor:pointer;

  background:
  linear-gradient(
    180deg,
    #ffd7e6,
    #ffb7cc
  );

  color:#fff;
  font-size:18px;
}

.hearts{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.heart{
  position:absolute;
  top:-40px;
  animation:fall 7s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@keyframes fall{
  from{
    transform:translateY(-40px);
    opacity:0;
  }

  to{
    transform:translateY(900px);
    opacity:.15;
  }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="1000054433.mp4" type="audio/mp4">
</audio>

<script>
const bgMusic =
document.getElementById("bgMusic");

function showLetter(){
  spawnHearts();

  setTimeout(() => {
    letterCard.classList.add("show");

    const player =
    document.getElementById(
      "musicPlayer"
    );

    if(player){
      player.classList.add("show");
    }

    bgMusic.play().catch(() => {});
  },180);
}

document.addEventListener(
  "click",
  () => {
    if(
      verified &&
      bgMusic.paused
    ){
      bgMusic.play();
    }
  }
);

const playBtn =
document.getElementById(
  "playBtn"
);

const progress =
document.getElementById(
  "musicProgress"
);

if(playBtn){
  playBtn.onclick = () => {
    if(bgMusic.paused){
      bgMusic.play();
      playBtn.textContent = "❚❚";
    }else{
      bgMusic.pause();
      playBtn.textContent = "▶";
    }
  };
}

bgMusic.addEventListener(
  "timeupdate",
  () => {
    if(!bgMusic.duration) return;

    const p =
      (bgMusic.currentTime /
       bgMusic.duration) * 100;

    if(progress){
      progress.style.width =
      p + "%";
    }
  }
);
</script>

</body>
</html>
