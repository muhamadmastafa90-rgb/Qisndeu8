<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA Verification 💖</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --love-color: #e91e63;
            --player-bg: #0d0e15;
            --player-text: #3b59ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .captcha-container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        /* چێکبۆکسەکە */
        .captcha-anchor {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 16px;
        }

        .anchor-content {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            user-select: none;
        }

        .anchor-checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: #fff;
        }

        .anchor-text {
            font-size: 14px;
            color: #202124;
            font-weight: 500;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 8px;
            color: #5f6368;
        }

        .brand-logo svg {
            width: 30px;
            height: 30px;
            margin-bottom: 2px;
        }

        /* تۆڕی وێنەکان */
        .grid-window {
            display: none;
        }

        .grid-header {
            background: var(--primary-color);
            color: white;
            padding: 18px;
            margin: -24px -24px 20px -24px;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
        }

        .grid-header strong {
            font-size: 18px;
            display: block;
            margin-top: 4px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            border: 2px solid transparent;
            overflow: hidden;
        }

        .grid-cell img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            pointer-events: none;
        }

        .grid-cell.selected {
            border-color: var(--primary-color);
        }

        .grid-cell.selected::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--primary-color);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .grid-footer {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #dadce0;
            padding-top: 16px;
        }

        .action-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }

        /* نامە و پلەیەرەکە */
        .success-window {
            display: none;
            text-align: center;
        }

        .card-letter {
            background: #fff5f7;
            border: 1px solid #ffe3e9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-letter h2 {
            color: var(--love-color);
            font-size: 18px;
            margin-bottom: 12px;
        }

        .card-letter p {
            font-size: 14px;
            color: #3c4043;
            line-height: 1.8;
            text-align: justify;
        }

        .main-img {
            width: 100%;
            max-width: 220px;
            height: auto;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
        }

        /* مۆسیقا پڵەیەر */
        .music-player {
            background-color: var(--player-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            direction: ltr;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .player-cover {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            object-fit: cover;
        }

        .player-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
        }

        .track-title {
            color: var(--player-text);
            font-size: 16px;
            font-weight: bold;
        }

        .time-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            color: var(--player-text);
            font-size: 13px;
        }

        .progress-bar-container {
            flex-grow: 1;
            height: 3px;
            background: #1a1b26;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--player-text);
            border-radius: 2px;
        }

        .player-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--player-text);
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--player-text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-pause-btn {
            font-size: 22px;
            font-weight: bold;
        }

        /* بارانی دڵەکان */
        .heart-fall {
            position: fixed;
            top: -20px;
            font-size: 20px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

<audio id="bgMusic" src="./74896a2c015d8bd377bdf7770c465185.mp3"></audio>

<div class="captcha-container" id="mainContainer">
    
    <div class="captcha-anchor" id="step1">
        <div class="anchor-content" onclick="openGrid()">
            <div class="anchor-checkbox" id="checkbox"></div>
            <span class="anchor-text">من ڕۆبۆت نیم، بەڵکوو ئاشقی تۆم ❤️🥺</span>
        </div>
        <div class="brand-logo">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>reCAPTCHA</span>
        </div>
    </div>

    <div class="grid-window" id="step2">
        <div class="grid-header">
            <h3>هەموو ئەو چوارگۆشانە هەڵبژێرە کە</h3>
            <strong>پاندا و ورچی خۆشەویستی تێدایە 🐼❤️🐻</strong>
        </div>
        <div class="image-grid">
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f98b/512.webp" alt="Butterfly">
            </div>
            <div class="grid-cell is-correct" onclick="toggleCell(this)">
                <img src="https://media.tenor.com/7b7X8Y8mJgYAAAAi/bubu-bubu-dudu.gif" alt="Panda Love">
            </div>
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f338/512.webp" alt="Flower">
            </div>
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f343/512.webp" alt="Leaf">
            </div>
            <div class="grid-cell is-correct" onclick="toggleCell(this)">
                <img src="https://media.tenor.com/0v8U9f3w7vIAAAAi/mochi-peach.gif" alt="Bear Hug">
            </div>
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f341/512.webp" alt="Maple">
            </div>
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f36d/512.webp" alt="Candy">
            </div>
            <div class="grid-cell" onclick="toggleCell(this)">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f353/512.webp" alt="Strawberry">
            </div>
            <div class="grid-cell is-correct" onclick="toggleCell(this)">
                <img src="https://media.tenor.com/K_shbQY8S_IAAAAi/peach-goma.gif" alt="Cute Panda">
            </div>
        </div>
        <div class="grid-footer">
            <button class="action-btn" onclick="verify()">سەلماندن</button>
        </div>
    </div>

    <div class="success-window" id="step3">
        <div class="card-letter">
            <h2>تاقانەکەی دڵم! 💖</h2>
            <img src="./IMG_20260626_051942.jpg" class="main-img" alt="SaqaW bm">
            <p id="typedText"></p>
        </div>

        <div class="music-player">
            <img src="./IMG_20260626_051942.jpg" class="player-cover" alt="Cover">
            <div class="player-info">
                <div class="track-title">خۆشەویستی من و تۆ</div>
                <div class="time-controls">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar-container" onclick="seek(event)">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="player-buttons">
                <button class="control-btn">⏮</button>
                <button class="control-btn play-pause-btn" onclick="togglePlay()" id="playBtn">⏸</button>
                <button class="control-btn">⏭</button>
            </div>
        </div>
    </div>

</div>

<script>
    const audio = document.getElementById('bgMusic');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const currentTimeText = document.getElementById('currentTime');
    const durationText = document.getElementById('duration');
    const fullText = "لەو ڕۆژەوەی هاتوویتە ژیانمەوە، هەموو شتێک جوانی و ئارامییەکی تایبەتی گرتووە! 🥺 تەنانەت بیرکردنەوەش لێت، زەردەخەنە دەخاتە سەر لێوەکانم. تۆ نەک هەر خۆشەویستمی، بەڵکوو ئارامیی ڕۆح و جوانترین ڕێکەوتی ژیانمی. 💕";

    function openGrid() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function toggleCell(element) {
        element.classList.toggle('selected');
    }

    function verify() {
        const totalCorrect = document.querySelectorAll('.grid-cell.is-correct').length;
        const selectedCorrect = document.querySelectorAll('.grid-cell.is-correct.selected').length;
        const selectedWrong = document.querySelectorAll('.grid-cell.selected:not(.is-correct)').length;

        if (selectedCorrect === totalCorrect && selectedWrong === 0) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            
            audio.load();
            setTimeout(() => {
                audio.play().catch(e => console.log("Play blocked"));
            }, 300);

            // چالاککردنی بارانی دڵ و نووسینی نامەکە بە جوانی
            startHeartRain();
            typeWriter();
        } else {
            alert('تکایە سەرجەم ئەو چوارگۆشانە هەڵبژێرە کە وێنەی پاندا و ورچەکەی تێدایە! 🥺❤️');
        }
    }

    // ئەنیمەیشنی نووسینی خودکار
    let index = 0;
    function typeWriter() {
        if (index < fullText.length) {
            document.getElementById("typedText").innerHTML += fullText.charAt(index);
            index++;
            setTimeout(typeWriter, 50);
        }
    }

    // دروستکردنی بارانی دڵ
    function startHeartRain() {
        const hearts = ['💖', '❤️', '💝', '🌸', '🐻', '🐼'];
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 300);
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${progress}%`;
            
            let currentMin = Math.floor(audio.currentTime / 60);
            let currentSec = Math.floor(audio.currentTime % 60);
            if(currentSec < 10) currentSec = '0' + currentSec;
            currentTimeText.innerText = `${currentMin}:${currentSec}`;
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        let totalMin = Math.floor(audio.duration / 60);
        let totalSec = Math.floor(audio.duration % 60);
        if(totalSec < 10) totalSec = '0' + totalSec;
        durationText.innerText = `${totalMin}:${totalSec}`;
    });

    function seek(event) {
        const container = event.currentTarget;
        const clickX = event.offsetX;
        const width = container.clientWidth;
        audio.currentTime = (clickX / width) * audio.duration;
    }
</script>

</body>
</html>
